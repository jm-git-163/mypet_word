# 매일 21개 공공기관 게시판을 훑어 data/feed.json 을 갱신하고,
# 바뀐 게 있으면 그대로 main 에 커밋한 뒤 Vercel 배포를 깨운다.
#
# ※ tools/collect.mjs → tools/promote.mjs 가 실제로 쓰는 파이프라인입니다.
#   (예전에 있던 build_feed.mjs 는 시험 단계 초안이라 여기서 부르지 않습니다)
name: 해운대 정보 피드 갱신

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch: {}      # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: 게시판 훑기(수집)
        run: node tools/collect.mjs --all

      - name: 18개 동 소식지 깊이 훑기(동별로 고르게)
        # 해운대구청 공지 게시판 하나에 18개 동 소식이 섞여 올라와서,
        # 최근 몇 쪽만 보면 인기 없는 동은 밀려서 하나도 안 잡힙니다.
        # 예전엔 이 도구를 사람이 손으로 한 번만 돌렸는데, 그러면
        # 다음 날부터는 다시 안 돌아 새로 올라온 동 소식을 놓칩니다.
        # 매일 도는 파이프라인 안에 넣어 계속 저절로 돌게 합니다.
        # (한 번뿐인 첫 백필은 80쪽까지 깊이 봤지만, 매일 도는 유지용은
        #  그렇게 깊이 안 봐도 되므로 20쪽으로 가볍게 둡니다)
        run: PAGES=20 node tools/backfill_dong.mjs

      - name: 선별·분류해 피드에 싣기
        run: node tools/promote.mjs

      - name: AI 쉬운말 변환(선택 — 키가 있을 때만)
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: node tools/ai_simplify.mjs

      - name: 오늘의 안심 브리핑 만들기(선택 — 키가 있을 때만)
        # 그날 소식 중 '오늘 어르신이 꼭 챙기실 것' 3가지를 AI 가 미리 골라 둡니다.
        # 앱 실행 중에는 AI 를 부르지 않고, 여기서 만든 결과만 바로 보여 줍니다.
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: node tools/brief.mjs

      - name: 바뀐 점이 있으면 main 에 바로 커밋
        run: |
          git config user.name "haeundae-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/feed.json
          git diff --cached --quiet && echo "변경 없음" && exit 0
          git commit -m "chore(feed): 해운대 정보 자동 갱신 $(date +%Y-%m-%d)"
          # 수집(30쪽 훑기)이 오래 걸려, 그 사이 다른 곳(제 손 포함)에서
          # main 에 먼저 커밋이 들어올 수 있습니다. 그러면 그냥 밀어붙이지
          # 않고, 최신 main 위로 다시 얹어서 재시도합니다(최대 3번).
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "밀림 감지 — main 을 다시 받아 얹습니다 ($i/3)"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
          done
          exit 1

      - name: Vercel 배포 깨우기
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl -X POST "$VERCEL_DEPLOY_HOOK_URL"
